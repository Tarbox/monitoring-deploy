name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted   # ВАЖНО

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy to monitoringVM
        run: |
          ssh monitoring@192.168.100.40 '
            rm -rf ~/monitoring
            git clone https://github.com/Tarbox/monitoring-deploy.git ~/monitoring

            cd ~/monitoring/docker
            docker-compose up -d
          '
