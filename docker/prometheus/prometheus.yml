global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'node-exporters'
    static_configs:
      - targets:
          - 'node-exporter:9100'
          - '192.168.100.1:9100'
          - '192.168.100.10:9100'
          - '192.168.100.20:9100'
          - '192.168.100.30:9100'
          - '192.168.100.40:9100'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

rule_files:
  - "alert.rules.yml"
